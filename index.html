<script type="text/babel">

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
const { useState, useEffect, useRef, useCallback, useMemo, useReducer } = React;
const NL = String.fromCharCode(10);

function generateId() {
  return 'l_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
}

function colorDistance(c1, c2) {
  return Math.sqrt(Math.pow(c1[0]-c2[0],2) + Math.pow(c1[1]-c2[1],2) + Math.pow(c1[2]-c2[2],2));
}

// ============================================================
// IMAGE ANALYSIS ENGINE
// ============================================================

class ImageAnalyzer {
  constructor(imageData, width, height) {
    this.imageData = imageData;
    this.width = width;
    this.height = height;
    this.pixels = imageData.data;
  }

  // K-Means color clustering
  extractColors(k = 8) {
    const samples = [];
    const step = Math.max(1, Math.floor((this.width * this.height) / 5000));
    for (let i = 0; i < this.pixels.length; i += step * 4) {
      const r = this.pixels[i], g = this.pixels[i+1], b = this.pixels[i+2], a = this.pixels[i+3];
      if (a > 128) samples.push([r, g, b]);
    }
    
    // Initialize centroids
    let centroids = [];
    for (let i = 0; i < k; i++) {
      centroids.push(samples[Math.floor(Math.random() * samples.length)] || [128, 128, 128]);
    }
    
    // K-means iterations
    for (let iter = 0; iter < 20; iter++) {
      const clusters = Array.from({length: k}, () => []);
      for (const sample of samples) {
        let minDist = Infinity, minIdx = 0;
        for (let c = 0; c < k; c++) {
          const d = colorDistance(sample, centroids[c]);
          if (d < minDist) { minDist = d; minIdx = c; }
        }
        clusters[minIdx].push(sample);
      }
      
      for (let c = 0; c < k; c++) {
        if (clusters[c].length > 0) {
          centroids[c] = [
            Math.round(clusters[c].reduce((s, p) => s + p[0], 0) / clusters[c].length),
            Math.round(clusters[c].reduce((s, p) => s + p[1], 0) / clusters[c].length),
            Math.round(clusters[c].reduce((s, p) => s + p[2], 0) / clusters[c].length)
          ];
        }
      }
    }
    
    // Count occurrences and sort by frequency
    const colorCounts = centroids.map((c, i) => ({ color: c, hex: rgbToHex(c[0], c[1], c[2]), count: 0 }));
    const step2 = Math.max(1, Math.floor((this.width * this.height) / 2000));
    for (let i = 0; i < this.pixels.length; i += step2 * 4) {
      const px = [this.pixels[i], this.pixels[i+1], this.pixels[i+2]];
      let minDist = Infinity, minIdx = 0;
      for (let c = 0; c < k; c++) {
        const d = colorDistance(px, centroids[c]);
        if (d < minDist) { minDist = d; minIdx = c; }
      }
      colorCounts[minIdx].count++;
    }
    
    return colorCounts.sort((a, b) => b.count - a.count).filter(c => c.count > 0);
  }

  // Edge detection using Sobel operator
  detectEdges() {
    const gray = new Float32Array(this.width * this.height);
    for (let i = 0; i < this.width * this.height; i++) {
      const idx = i * 4;
      gray[i] = 0.299 * this.pixels[idx] + 0.587 * this.pixels[idx+1] + 0.114 * this.pixels[idx+2];
    }
    
    const edges = new Float32Array(this.width * this.height);
    const gx = [-1,0,1,-2,0,2,-1,0,1];
    const gy = [-1,-2,-1,0,0,0,1,2,1];
    
    for (let y = 1; y < this.height - 1; y++) {
      for (let x = 1; x < this.width - 1; x++) {
        let sumX = 0, sumY = 0;
        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            const idx = (y + ky) * this.width + (x + kx);
            const ki = (ky + 1) * 3 + (kx + 1);
            sumX += gray[idx] * gx[ki];
            sumY += gray[idx] * gy[ki];
          }
        }
        edges[y * this.width + x] = Math.sqrt(sumX * sumX + sumY * sumY);
      }
    }
    return edges;
  }

  // Detect horizontal and vertical lines (layout boundaries)
  detectLayoutRegions() {
    const edges = this.detectEdges();
    const threshold = 50;
    const regions = [];
    
    // Scan for horizontal lines (row-based density)
    const rowDensity = new Float32Array(this.height);
    for (let y = 0; y < this.height; y++) {
      let count = 0;
      for (let x = 0; x < this.width; x++) {
        if (edges[y * this.width + x] > threshold) count++;
      }
      rowDensity[y] = count / this.width;
    }
    
    // Find section breaks (rows with high edge density)
    const breaks = [0];
    let inBreak = false;
    for (let y = 0; y < this.height; y++) {
      if (rowDensity[y] > 0.3 && !inBreak) {
        breaks.push(y);
        inBreak = true;
      } else if (rowDensity[y] < 0.1) {
        inBreak = false;
      }
    }
    breaks.push(this.height);
    
    // Create regions from breaks
    for (let i = 0; i < breaks.length - 1; i++) {
      const y1 = breaks[i];
      const y2 = breaks[i + 1];
      if (y2 - y1 > 20) {
        regions.push({ x: 0, y: y1, width: this.width, height: y2 - y1 });
      }
    }
    
    return regions.length > 0 ? regions : [{ x: 0, y: 0, width: this.width, height: this.height }];
  }

  // Detect uniform color blocks (potential components)
  detectComponents() {
    const blockSize = Math.max(8, Math.min(this.width, this.height) / 40);
    const components = [];
    const visited = new Set();
    
    for (let y = 0; y < this.height - blockSize; y += blockSize) {
      for (let x = 0; x < this.width - blockSize; x += blockSize) {
        const key = `${Math.floor(x/blockSize)},${Math.floor(y/blockSize)}`;
        if (visited.has(key)) continue;
        
        // Sample color at this block
        const idx = (Math.floor(y) * this.width + Math.floor(x)) * 4;
        const baseColor = [this.pixels[idx], this.pixels[idx+1], this.pixels[idx+2]];
        
        // Flood fill to find extent of uniform color
        let maxX = x, maxY = y;
        let uniform = true;
        
        for (let dy = 0; dy < blockSize * 4 && y + dy < this.height && uniform; dy += blockSize/2) {
          for (let dx = 0; dx < blockSize * 8 && x + dx < this.width && uniform; dx += blockSize/2) {
            const ci = (Math.floor(y + dy) * this.width + Math.floor(x + dx)) * 4;
            const d = colorDistance(baseColor, [this.pixels[ci], this.pixels[ci+1], this.pixels[ci+2]]);
            if (d < 30) {
              maxX = Math.max(maxX, x + dx);
              maxY = Math.max(maxY, y + dy);
            } else {
              uniform = false;
            }
          }
        }
        
        const w = maxX - x + blockSize;
        const h = maxY - y + blockSize;
        
        if (w > blockSize * 2 && h > blockSize * 1.5) {
          const aspect = w / h;
          let type = 'container';
          
          // Use relative thresholds based on image dimensions instead of absolute pixels
          const relH = h / this.height;
          const relW = w / this.width;
          
          if (aspect > 3 && relH < 0.05) type = 'button';
          else if (aspect > 4 && relH < 0.04) type = 'input';
          else if (aspect > 0.7 && aspect < 1.5 && relW < 0.25) type = 'card';
          else if (relH < 0.06 && relW > 0.7) type = 'navigation';
          else if (relW > 0.6) type = 'section';
          
          components.push({
            x: Math.round(x), y: Math.round(y),
            width: Math.round(w), height: Math.round(h),
            type,
            color: rgbToHex(baseColor[0], baseColor[1], baseColor[2])
          });
          
          visited.add(key);
        }
      }
    }
    
    // Merge overlapping components
    return this.mergeOverlapping(components);
  }

  mergeOverlapping(components) {
    let current = components;
    let changed = true;
    
    // Run until no more merges occur (convergence)
    while (changed) {
      changed = false;
      const merged = [];
      const used = new Set();
      
      for (let i = 0; i < current.length; i++) {
        if (used.has(i)) continue;
        let rect = { ...current[i] };
        
        for (let j = i + 1; j < current.length; j++) {
          if (used.has(j)) continue;
          const other = current[j];
          
          // Check overlap
          if (rect.x < other.x + other.width && rect.x + rect.width > other.x &&
              rect.y < other.y + other.height && rect.y + rect.height > other.y &&
              rect.type === other.type) {
            const newX = Math.min(rect.x, other.x);
            const newY = Math.min(rect.y, other.y);
            rect.width = Math.max(rect.x + rect.width, other.x + other.width) - newX;
            rect.height = Math.max(rect.y + rect.height, other.y + other.height) - newY;
            rect.x = newX;
            rect.y = newY;
            used.add(j);
            changed = true;
          }
        }
        
        merged.push(rect);
        used.add(i);
      }
      
      current = merged;
    }
    
    return current.slice(0, 50); // Limit to 50 components
  }

  // Detect spacing patterns
  detectSpacing(regions) {
    const gaps = [];
    for (let i = 1; i < regions.length; i++) {
      const gap = regions[i].y - (regions[i-1].y + regions[i-1].height);
      if (gap > 0) gaps.push(gap);
    }
    
    // Find common spacing values
    const spacingScale = [4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80, 96];
    const detected = {};
    
    for (const gap of gaps) {
      const nearest = spacingScale.reduce((prev, curr) => 
        Math.abs(curr - gap) < Math.abs(prev - gap) ? curr : prev
      );
      detected[nearest] = (detected[nearest] || 0) + 1;
    }
    
    return Object.entries(detected)
      .sort((a, b) => b[1] - a[1])
      .map(([value]) => parseInt(value));
  }
}


// ============================================================
// INDEXEDDB PERSISTENCE
// ============================================================

const DB_NAME = 'PixelToPrototypeDB';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('projects')) {
        db.createObjectStore('projects', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('images')) {
        db.createObjectStore('images', { keyPath: 'id' });
      }
    };
  });
}

async function saveProject(project) {
  const db = await openDB();
  const tx = db.transaction('projects', 'readwrite');
  tx.objectStore('projects').put(project);
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadProject(id) {
  const db = await openDB();
  const tx = db.transaction('projects', 'readonly');
  const request = tx.objectStore('projects').get(id);
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function listProjects() {
  const db = await openDB();
  const tx = db.transaction('projects', 'readonly');
  const request = tx.objectStore('projects').getAll();
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result || []);
    request.onerror = () => reject(request.error);
  });
}

async function saveImage(id, dataUrl) {
  const db = await openDB();
  const tx = db.transaction('images', 'readwrite');
  tx.objectStore('images').put({ id, dataUrl, timestamp: Date.now() });
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

// ============================================================
// EXPORT ENGINES
// ============================================================

function generateFigmaJSON(layers, colors, typography, spacing) {
  const figmaDoc = {
    document: {
      id: "0:0",
      name: "PixelToPrototype Export",
      type: "DOCUMENT",
      children: [{
        id: "0:1",
        name: "Page 1",
        type: "CANVAS",
        backgroundColor: { r: 1, g: 1, b: 1, a: 1 },
        children: layers.map((layer, i) => convertLayerToFigmaNode(layer, `1:${i}`))
      }]
    },
    components: {},
    componentSets: {},
    schemaVersion: 0,
    styles: generateFigmaStyles(colors, typography),
    variables: generateFigmaVariables(colors, spacing)
  };
  return JSON.stringify(figmaDoc, null, 2);
}

function convertLayerToFigmaNode(layer, id) {
  const node = {
    id,
    name: layer.name,
    type: layer.type === 'text' ? 'TEXT' : 'FRAME',
    visible: layer.visible !== false,
    locked: layer.locked || false,
    absoluteBoundingBox: {
      x: layer.x || 0,
      y: layer.y || 0,
      width: layer.width || 100,
      height: layer.height || 100
    },
    constraints: { vertical: "TOP", horizontal: "LEFT" },
    fills: layer.fill ? [{ type: "SOLID", color: hexToFigmaColor(layer.fill), opacity: 1 }] : [],
    strokes: layer.stroke ? [{ type: "SOLID", color: hexToFigmaColor(layer.stroke) }] : [],
    strokeWeight: layer.strokeWidth || 0,
    cornerRadius: layer.borderRadius || 0,
    effects: layer.shadow ? [{
      type: "DROP_SHADOW",
      color: { r: 0, g: 0, b: 0, a: 0.25 },
      offset: { x: 0, y: 4 },
      radius: 8,
      visible: true
    }] : [],
    children: (layer.children || []).map((child, i) => convertLayerToFigmaNode(child, `${id}:${i}`))
  };

  if (layer.type === 'text') {
    node.characters = layer.content || layer.name;
    node.style = {
      fontFamily: layer.fontFamily || "Inter",
      fontSize: layer.fontSize || 14,
      fontWeight: layer.fontWeight || 400,
      lineHeightPx: layer.lineHeight || layer.fontSize * 1.5,
      letterSpacing: layer.letterSpacing || 0,
      textAlignHorizontal: (layer.textAlign || 'LEFT').toUpperCase()
    };
  }

  return node;
}

function hexToFigmaColor(hex) {
  const rgb = hexToRgb(hex || '#000000');
  if (!rgb) return { r: 0, g: 0, b: 0, a: 1 };
  return { r: rgb.r / 255, g: rgb.g / 255, b: rgb.b / 255, a: 1 };
}

function generateFigmaStyles(colors, typography) {
  const styles = {};
  colors.forEach((c, i) => {
    styles[`color_${i}`] = {
      key: `color_${i}`,
      name: `Color/${i + 1}`,
      styleType: "FILL",
      description: `Extracted color ${c.hex}`
    };
  });
  typography.forEach((t, i) => {
    styles[`text_${i}`] = {
      key: `text_${i}`,
      name: `Typography/${t.name}`,
      styleType: "TEXT",
      description: `${t.fontSize}px ${t.fontWeight}`
    };
  });
  return styles;
}

function generateFigmaVariables(colors, spacing) {
  return {
    collections: [{
      id: "colors",
      name: "Colors",
      modes: [{ modeId: "default", name: "Default" }],
      variables: colors.map((c, i) => ({
        id: `color_var_${i}`,
        name: `color-${i + 1}`,
        resolvedType: "COLOR",
        valuesByMode: { default: hexToFigmaColor(c.hex) }
      }))
    }, {
      id: "spacing",
      name: "Spacing",
      modes: [{ modeId: "default", name: "Default" }],
      variables: spacing.map((s, i) => ({
        id: `spacing_var_${i}`,
        name: `spacing-${s}`,
        resolvedType: "FLOAT",
        valuesByMode: { default: s }
      }))
    }]
  };
}

function generateDesignTokens(colors, typography, spacing) {
  return {
    color: Object.fromEntries(colors.map((c, i) => [`color-${i+1}`, { value: c.hex, type: 'color' }])),
    typography: Object.fromEntries(typography.map(t => [t.name, {
      value: { fontFamily: t.fontFamily, fontSize: `${t.fontSize}px`, fontWeight: t.fontWeight, lineHeight: `${t.lineHeight}px` },
      type: 'typography'
    }])),
    spacing: Object.fromEntries(spacing.map(s => [`spacing-${s}`, { value: `${s}px`, type: 'dimension' }])),
    borderRadius: { sm: { value: '4px', type: 'dimension' }, md: { value: '8px', type: 'dimension' }, lg: { value: '12px', type: 'dimension' }, xl: { value: '16px', type: 'dimension' } },
    shadow: { sm: { value: '0 1px 2px rgba(0,0,0,0.05)', type: 'shadow' }, md: { value: '0 4px 6px rgba(0,0,0,0.1)', type: 'shadow' }, lg: { value: '0 10px 15px rgba(0,0,0,0.1)', type: 'shadow' } }
  };
}

function generateHTMLExport(layers) {
  let html = '<!DOCTYPE html>' + NL + '<html lang="en">' + NL + '<head>' + NL + '<meta charset="UTF-8">' + NL + '<meta name="viewport" content="width=device-width, initial-scale=1.0">' + NL + '<title>Exported Design</title>' + NL + '<style>' + NL;
  html += '* { box-sizing: border-box; margin: 0; padding: 0; }' + NL;
  html += 'body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }' + NL;
  
  layers.forEach((layer, i) => {
    html += `.layer-${i} { position: absolute; left: ${layer.x}px; top: ${layer.y}px; width: ${layer.width}px; height: ${layer.height}px;`;
    if (layer.fill) html += ` background: ${layer.fill};`;
    if (layer.borderRadius) html += ` border-radius: ${layer.borderRadius}px;`;
    if (layer.fontSize) html += ` font-size: ${layer.fontSize}px;`;
    html += ' }' + NL;
  });
  
  html += '</style>' + NL + '</head>' + NL + '<body>' + NL + '<div style="position:relative;">' + NL;
  layers.forEach((layer, i) => {
    if (layer.type === 'text') {
      html += `  <p class="layer-${i}">${layer.content || layer.name}</p>` + NL;
    } else {
      html += `  <div class="layer-${i}"></div>` + NL;
    }
  });
  html += '</div>' + NL + '</body>' + NL + '</html>';
  return html;
}

function generateReactExport(layers) {
  let code = 'import React from "react";' + NL + NL;
  code += 'export default function ExportedDesign() {' + NL + '  return (' + NL + '    <div style={{position: "relative"}}>' + NL;
  layers.forEach(layer => {
    const style = `{position:"absolute",left:${layer.x},top:${layer.y},width:${layer.width},height:${layer.height}${layer.fill?`,background:"${layer.fill}"`:""}${layer.borderRadius?`,borderRadius:${layer.borderRadius}`:""}}`;
    if (layer.type === 'text') {
      code += `      <p style=${style}>${layer.content || layer.name}</p>` + NL;
    } else {
      code += `      <div style=${style} />` + NL;
    }
  });
  code += '    </div>' + NL + '  );' + NL + '}';
  return code;
}

function generateTailwindExport(layers) {
  let html = '<div class="relative">' + NL;
  layers.forEach(layer => {
    const classes = `absolute`;
    if (layer.type === 'text') {
      html += `  <p class="${classes}" style="left:${layer.x}px;top:${layer.y}px;width:${layer.width}px">${layer.content || layer.name}</p>` + NL;
    } else {
      html += `  <div class="${classes} rounded" style="left:${layer.x}px;top:${layer.y}px;width:${layer.width}px;height:${layer.height}px;background:${layer.fill||'#eee'}"></div>` + NL;
    }
  });
  html += '</div>';
  return html;
}

function generateCSSExport(layers) {
  let css = '/* Generated by PixelToPrototype AI */' + NL + NL;
  layers.forEach((layer, i) => {
    css += `.${layer.name.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase()} {` + NL;
    css += `  position: absolute;` + NL + `  left: ${layer.x}px;` + NL + `  top: ${layer.y}px;` + NL + `  width: ${layer.width}px;` + NL + `  height: ${layer.height}px;` + NL;
    if (layer.fill) css += `  background-color: ${layer.fill};` + NL;
    if (layer.borderRadius) css += `  border-radius: ${layer.borderRadius}px;` + NL;
    if (layer.fontSize) css += `  font-size: ${layer.fontSize}px;` + NL;
    css += '}' + NL + NL;
  });
  return css;
}

function generateSVGExport(layers, width, height) {
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">` + NL;
  layers.forEach(layer => {
    if (layer.type === 'text') {
      svg += `  <text x="${layer.x}" y="${layer.y + (layer.fontSize || 14)}" font-size="${layer.fontSize || 14}" fill="${layer.fill || '#000'}">${layer.content || layer.name}</text>` + NL;
    } else {
      svg += `  <rect x="${layer.x}" y="${layer.y}" width="${layer.width}" height="${layer.height}" fill="${layer.fill || '#ccc'}" rx="${layer.borderRadius || 0}" />` + NL;
    }
  });
  svg += '</svg>';
  return svg;
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// ANALYSIS PROGRESS PANEL
// ============================================================

function AnalysisPanel({ progress, isAnalyzing }) {
  const steps = [
    { label: 'Detecting layout structure', key: 'layout' },
    { label: 'Detecting typography', key: 'typography' },
    { label: 'Extracting colors', key: 'colors' },
    { label: 'Detecting components', key: 'components' },
    { label: 'Rebuilding structure', key: 'structure' },
    { label: 'Generating editable layers', key: 'layers' },
  ];

  if (!isAnalyzing && progress === 0) return null;

  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 animate-slide-in">
      <div className="bg-editor-panel rounded-xl p-8 w-96 shadow-2xl border border-editor-border">
        <div className="flex items-center gap-3 mb-6">
          <div className="w-8 h-8 rounded-full bg-editor-accent/20 flex items-center justify-center">
            <div className="w-4 h-4 border-2 border-editor-accent border-t-transparent rounded-full animate-spin-custom"></div>
          </div>
          <div>
            <h3 className="text-base font-semibold text-editor-text">Analyzing Image</h3>
            <p className="text-xs text-editor-muted">AI is processing your screenshot</p>
          </div>
        </div>
        
        <div className="space-y-3">
          {steps.map((step, i) => {
            const stepProgress = Math.min(100, Math.max(0, (progress - i * 16.66) / 16.66 * 100));
            const isComplete = progress > (i + 1) * 16.66;
            const isActive = progress >= i * 16.66 && !isComplete;
            
            return (
              <div key={step.key} className="flex items-center gap-3">
                <div className={`w-5 h-5 rounded-full flex items-center justify-center text-xs ${
                  isComplete ? 'bg-green-500 text-white' : isActive ? 'bg-editor-accent text-white' : 'bg-editor-border text-editor-muted'
                }`}>
                  {isComplete ? '✓' : (i + 1)}
                </div>
                <div className="flex-1">
                  <div className="text-xs text-editor-text">{step.label}</div>
                  {isActive && (
                    <div className="mt-1 h-1 bg-editor-border rounded-full overflow-hidden">
                      <div className="progress-bar h-full" style={{ width: `${stepProgress}%` }}></div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        
        <div className="mt-6 h-2 bg-editor-border rounded-full overflow-hidden">
          <div className="progress-bar h-full" style={{ width: `${progress}%` }}></div>
        </div>
        <div className="mt-2 text-xs text-editor-muted text-center">{Math.round(progress)}% complete</div>
      </div>
    </div>
  );
}

// LEFT SIDEBAR - LAYER TREE

function LayerTreeItem({ layer, depth = 0, selectedLayers, onSelect, onToggleVisibility, onToggleLock, onRename, onDelete, onDuplicate }) {
  const [expanded, setExpanded] = useState(true);
  const [editing, setEditing] = useState(false);
  const [editName, setEditName] = useState(layer.name);
  const isSelected = selectedLayers.includes(layer.id);
  const hasChildren = layer.children && layer.children.length > 0;

  const handleDoubleClick = (e) => {
    e.stopPropagation();
    setEditing(true);
    setEditName(layer.name);
  };

  const handleRenameSubmit = () => {
    setEditing(false);
    if (editName.trim()) onRename(layer.id, editName.trim());
  };

  const getIcon = () => {
    switch(layer.type) {
      case 'frame': return <Icons.Frame />;
      case 'text': return <Icons.Text />;
      case 'image': return <Icons.Image />;
      case 'section': return <Icons.Folder />;
      case 'group': return <Icons.Folder />;
      default: return <Icons.Component />;
    }
  };

  return (
    <div>
      <div
        className={`layer-tree-item flex items-center gap-1 py-1 px-2 cursor-pointer ${isSelected ? 'selected' : ''}`}
        style={{ paddingLeft: `${depth * 16 + 8}px` }}
        onClick={(e) => onSelect(layer.id, e.shiftKey || e.metaKey)}
        onDoubleClick={handleDoubleClick}
      >
        {hasChildren ? (
          <span onClick={(e) => { e.stopPropagation(); setExpanded(!expanded); }} className="cursor-pointer opacity-60 hover:opacity-100">
            {expanded ? <Icons.ChevronDown /> : <Icons.ChevronRight />}
          </span>
        ) : <span className="w-3"></span>}
        
        <span className="opacity-60">{getIcon()}</span>
        
        {editing ? (
          <input
            className="input-field flex-1 py-0 text-xs"
            value={editName}
            onChange={(e) => setEditName(e.target.value)}
            onBlur={handleRenameSubmit}
            onKeyDown={(e) => { if (e.key === 'Enter') handleRenameSubmit(); if (e.key === 'Escape') setEditing(false); }}
            autoFocus
            onClick={(e) => e.stopPropagation()}
          />
        ) : (
          <span className="flex-1 text-xs truncate">{layer.name}</span>
        )}
        
        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100" style={{ opacity: isSelected ? 1 : undefined }}>
          <button onClick={(e) => { e.stopPropagation(); onToggleVisibility(layer.id); }} className="hover:text-editor-accent">
            {layer.visible !== false ? <Icons.Eye /> : <Icons.EyeOff />}
          </button>
          <button onClick={(e) => { e.stopPropagation(); onToggleLock(layer.id); }} className="hover:text-editor-accent">
            {layer.locked ? <Icons.Lock /> : <Icons.Unlock />}
          </button>
        </div>
      </div>
      
      {expanded && hasChildren && layer.children.map(child => (
        <LayerTreeItem
          key={child.id}
          layer={child}
          depth={depth + 1}
          selectedLayers={selectedLayers}
          onSelect={onSelect}
          onToggleVisibility={onToggleVisibility}
          onToggleLock={onToggleLock}
          onRename={onRename}
          onDelete={onDelete}
          onDuplicate={onDuplicate}
        />
      ))}
    </div>
  );
}

  );
}

function getAllLayers(layers) {
  let result = [];
  for (const layer of layers) {
    result.push(layer);
    if (layer.children) result = result.concat(getAllLayers(layer.children));
  }
  return result;
}

function CanvasEditor({ layers, selectedLayers, onSelect, onUpdateLayer, onDragStart, onDragEnd, zoom, pan, onZoom, onPan, canvasSize, sourceImage }) {
  const canvasRef = useRef(null);
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
  const [dragType, setDragType] = useState(null); // 'move', 'resize', 'pan'
  const [resizeHandle, setResizeHandle] = useState(null);
  const [isPanning, setIsPanning] = useState(false);
  const [spaceHeld, setSpaceHeld] = useState(false);
  const [selectionBox, setSelectionBox] = useState(null);
  const [dragSnapshotted, setDragSnapshotted] = useState(false);

  const allLayers = useMemo(() => getAllLayers(layers), [layers]);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    onZoom(clamp(zoom + delta, 0.1, 5));
  }, [zoom, onZoom]);

  const handleMouseDown = (e) => {
    if (e.button === 1 || spaceHeld) {
      // Middle mouse or space+click for panning
      setIsPanning(true);
      setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
      return;
    }
    
    if (e.button === 0 && e.target === canvasRef.current) {
      // Click on empty canvas - start selection box or deselect
      const rect = canvasRef.current.getBoundingClientRect();
      const x = (e.clientX - rect.left - pan.x) / zoom;
      const y = (e.clientY - rect.top - pan.y) / zoom;
      setSelectionBox({ x1: x, y1: y, x2: x, y2: y });
      if (!e.shiftKey) onSelect(null, false);
    }
  };

  const handleMouseMove = (e) => {
    if (isPanning) {
      onPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
      return;
    }
    
    if (isDragging && dragType === 'move') {
      const dx = (e.clientX - dragStart.x) / zoom;
      const dy = (e.clientY - dragStart.y) / zoom;
      selectedLayers.forEach(id => {
        const layer = findLayer(layers, id);
        if (layer && !layer.locked) {
          onUpdateLayer(id, { x: layer.x + dx, y: layer.y + dy });
        }
      });
      setDragStart({ x: e.clientX, y: e.clientY });
      return;
    }
    
    if (isDragging && dragType === 'resize' && resizeHandle) {
      const dx = (e.clientX - dragStart.x) / zoom;
      const dy = (e.clientY - dragStart.y) / zoom;
      const layer = findLayer(layers, selectedLayers[0]);
      if (layer) {
        const updates = {};
        if (resizeHandle.includes('e')) { updates.width = Math.max(10, layer.width + dx); }
        if (resizeHandle.includes('w')) { updates.x = layer.x + dx; updates.width = Math.max(10, layer.width - dx); }
        if (resizeHandle.includes('s')) { updates.height = Math.max(10, layer.height + dy); }
        if (resizeHandle.includes('n')) { updates.y = layer.y + dy; updates.height = Math.max(10, layer.height - dy); }
        onUpdateLayer(layer.id, updates);
      }
      setDragStart({ x: e.clientX, y: e.clientY });
      return;
    }
    
    if (selectionBox) {
      const rect = canvasRef.current.getBoundingClientRect();
      const x = (e.clientX - rect.left - pan.x) / zoom;
      const y = (e.clientY - rect.top - pan.y) / zoom;
      setSelectionBox(prev => ({ ...prev, x2: x, y2: y }));
    }
  };

  const handleMouseUp = () => {
    if (selectionBox) {
      // Find layers within selection box
      const box = {
        x: Math.min(selectionBox.x1, selectionBox.x2),
        y: Math.min(selectionBox.y1, selectionBox.y2),
        width: Math.abs(selectionBox.x2 - selectionBox.x1),
        height: Math.abs(selectionBox.y2 - selectionBox.y1)
      };
      if (box.width > 5 && box.height > 5) {
        allLayers.forEach(layer => {
          if (layer.x >= box.x && layer.y >= box.y && 
              layer.x + layer.width <= box.x + box.width && 
              layer.y + layer.height <= box.y + box.height) {
            onSelect(layer.id, true);
          }
        });
      }
      setSelectionBox(null);
    }
    // Commit undo snapshot after drag/resize completes
    if (dragSnapshotted && isDragging && (dragType === 'move' || dragType === 'resize')) {
      onDragEnd && onDragEnd(layers);
    }
    setIsDragging(false);
    setIsPanning(false);
    setDragType(null);
    setResizeHandle(null);
    setDragSnapshotted(false);
  };

  const handleLayerMouseDown = (e, layerId) => {
    e.stopPropagation();
    const layer = findLayer(layers, layerId);
    if (layer && layer.locked) return;
    
    if (!selectedLayers.includes(layerId)) {
      onSelect(layerId, e.shiftKey || e.metaKey);
    }
    
    // Snapshot state before drag begins for undo support
    onDragStart && onDragStart(layers);
    setIsDragging(true);
    setDragType('move');
    setDragStart({ x: e.clientX, y: e.clientY });
    setDragSnapshotted(true);
  };

  const handleResizeMouseDown = (e, handle) => {
    e.stopPropagation();
    // Snapshot state before resize begins for undo support
    onDragStart && onDragStart(layers);
    setIsDragging(true);
    setDragType('resize');
    setResizeHandle(handle);
    setDragStart({ x: e.clientX, y: e.clientY });
    setDragSnapshotted(true);
  };

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.code === 'Space' && !e.target.closest('input')) {
        e.preventDefault();
        setSpaceHeld(true);
      }
    };
    const handleKeyUp = (e) => {
      if (e.code === 'Space') setSpaceHeld(false);
    };
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    return () => {
      window.removeEventListener('keydown', handleKeyDown);
      window.removeEventListener('keyup', handleKeyUp);
    };
  }, []);

  const renderLayer = (layer) => {
    if (layer.visible === false) return null;
    const isSelected = selectedLayers.includes(layer.id);
    
    const style = {
      position: 'absolute',
      left: layer.x,
      top: layer.y,
      width: layer.width,
      height: layer.height,
      transform: layer.rotation ? `rotate(${layer.rotation}deg)` : undefined,
      backgroundColor: layer.type !== 'text' ? (layer.fill || 'transparent') : undefined,
      borderRadius: layer.borderRadius || 0,
      border: layer.stroke ? `${layer.strokeWidth || 1}px solid ${layer.stroke}` : (isSelected ? '1px solid #7c6ef6' : '1px solid transparent'),
      boxShadow: layer.shadow ? `${layer.shadowX||0}px ${layer.shadowY||4}px ${layer.shadowBlur||8}px ${layer.shadowSpread||0}px rgba(0,0,0,0.2)` : undefined,
      cursor: layer.locked ? 'not-allowed' : 'move',
      opacity: layer.opacity !== undefined ? layer.opacity : 1,
      overflow: 'hidden',
      fontSize: layer.fontSize || undefined,
      fontWeight: layer.fontWeight || undefined,
      fontFamily: layer.fontFamily || undefined,
      lineHeight: layer.lineHeight ? `${layer.lineHeight}px` : undefined,
      letterSpacing: layer.letterSpacing || undefined,
      textAlign: layer.textAlign || undefined,
      color: layer.type === 'text' ? (layer.fill || '#000') : undefined,
      display: layer.autoLayout === 'horizontal' ? 'flex' : layer.autoLayout === 'vertical' ? 'flex' : undefined,
      flexDirection: layer.autoLayout === 'vertical' ? 'column' : undefined,
      gap: layer.gap || undefined,
      padding: layer.padding || undefined,
    };

    return (
      <div key={layer.id}>
        <div
          style={style}
          onMouseDown={(e) => handleLayerMouseDown(e, layer.id)}
          onClick={(e) => { e.stopPropagation(); onSelect(layer.id, e.shiftKey || e.metaKey); }}
          title={layer.name}
        >
          {layer.type === 'text' && (layer.content || layer.name)}
          {layer.type === 'image' && layer.imageData && (
            <img src={layer.imageData} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
          )}
          {layer.children && layer.children.map(child => renderLayer(child))}
        </div>
        
        {/* Selection handles - sized inversely to zoom so they appear constant on screen */}
        {isSelected && (
          <>
            {(() => {
              const hSize = 8 / zoom;
              const hOffset = hSize / 2;
              return <>
                <div className="resize-handle" style={{ left: layer.x - hOffset, top: layer.y - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 'nw')} />
                <div className="resize-handle" style={{ left: layer.x + layer.width/2 - hOffset, top: layer.y - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 'n')} />
                <div className="resize-handle" style={{ left: layer.x + layer.width - hOffset, top: layer.y - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 'ne')} />
                <div className="resize-handle" style={{ left: layer.x + layer.width - hOffset, top: layer.y + layer.height/2 - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 'e')} />
                <div className="resize-handle" style={{ left: layer.x + layer.width - hOffset, top: layer.y + layer.height - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 'se')} />
                <div className="resize-handle" style={{ left: layer.x + layer.width/2 - hOffset, top: layer.y + layer.height - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 's')} />
                <div className="resize-handle" style={{ left: layer.x - hOffset, top: layer.y + layer.height - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 'sw')} />
                <div className="resize-handle" style={{ left: layer.x - hOffset, top: layer.y + layer.height/2 - hOffset, width: hSize, height: hSize }} onMouseDown={(e) => handleResizeMouseDown(e, 'w')} />
              </>;
            })()}
          </>
        )}
      </div>
    );
  };

  return (
    <div
      className="flex-1 overflow-hidden relative bg-editor-bg"
      onWheel={handleWheel}
      onMouseDown={handleMouseDown}
      onMouseMove={handleMouseMove}
      onMouseUp={handleMouseUp}
      onMouseLeave={handleMouseUp}
      style={{ cursor: spaceHeld || isPanning ? 'grab' : 'default' }}
    >
      {/* Rulers */}
      <div className="absolute top-0 left-0 right-0 h-6 bg-editor-surface border-b border-editor-border z-10 flex items-end">
        {Array.from({length: 50}, (_, i) => (
          <div key={i} className="absolute text-[8px] text-editor-muted" style={{ left: pan.x + i * 100 * zoom }}>
            <span>{i * 100}</span>
          </div>
        ))}
      </div>
      <div className="absolute top-6 left-0 bottom-0 w-6 bg-editor-surface border-r border-editor-border z-10 flex flex-col items-end">
        {Array.from({length: 50}, (_, i) => (
          <div key={i} className="absolute text-[8px] text-editor-muted" style={{ top: pan.y + i * 100 * zoom - 24 }}>
            <span className="block -rotate-90">{i * 100}</span>
          </div>
        ))}
      </div>

      {/* Canvas area */}
      <div
        ref={canvasRef}
        className="absolute inset-0 mt-6 ml-6 canvas-grid"
        style={{ cursor: spaceHeld ? 'grab' : 'crosshair' }}
      >
        <div style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '0 0' }}>
          {/* Source image background */}
          {sourceImage && (
            <div style={{ position: 'absolute', left: 0, top: 0, width: canvasSize.width, height: canvasSize.height, opacity: 0.3 }}>
              <img src={sourceImage} style={{ width: '100%', height: '100%', objectFit: 'contain' }} />
            </div>
          )}
          
          {/* Render all layers */}
          {allLayers.map(layer => renderLayer(layer))}
          
          {/* Selection box */}
          {selectionBox && (
            <div className="selection-box" style={{
              position: 'absolute',
              left: Math.min(selectionBox.x1, selectionBox.x2),
              top: Math.min(selectionBox.y1, selectionBox.y2),
              width: Math.abs(selectionBox.x2 - selectionBox.x1),
              height: Math.abs(selectionBox.y2 - selectionBox.y1),
              pointerEvents: 'none'
            }} />
          )}
        </div>
      </div>
    </div>
  );
}

function findLayer(layers, id) {
  for (const layer of layers) {
    if (layer.id === id) return layer;
    if (layer.children) {
      const found = findLayer(layer.children, id);
      if (found) return found;
    }
  }
  return null;
}

function UploadModal({ isOpen, onClose, onImageLoad }) {
  const [isDragOver, setIsDragOver] = useState(false);
  const fileInputRef = useRef(null);

  if (!isOpen) return null;

  const handleFile = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      onImageLoad(e.target.result);
      onClose();
    };
    reader.readAsDataURL(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setIsDragOver(false);
    const file = e.dataTransfer.files[0];
    handleFile(file);
  };

  const handleDragOver = (e) => {
    e.preventDefault();
    setIsDragOver(true);

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 animate-slide-in" onClick={onClose}>

// ============================================================

function App() {
  // State
  const [layers, setLayers] = useState([]);
  const [selectedLayers, setSelectedLayers] = useState([]);
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 100, y: 100 });
  const [canvasSize, setCanvasSize] = useState({ width: 1440, height: 900 });
  const [sourceImage, setSourceImage] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [analysisProgress, setAnalysisProgress] = useState(0);
  const [showUpload, setShowUpload] = useState(false);
  const [activeTab, setActiveTab] = useState('layers');
  const [tool, setTool] = useState('select');
  const [colors, setColors] = useState([]);
  const [typography, setTypography] = useState([]);
  const [spacing, setSpacing] = useState([]);
  const [contextMenu, setContextMenu] = useState(null);
  const [hasProject, setHasProject] = useState(false);
  const [ocrWarning, setOcrWarning] = useState(null);

  // History management via useReducer to avoid stale closures
  const historyReducer = (state, action) => {
    switch (action.type) {
      case 'PUSH': {
        const newEntries = state.entries.slice(0, state.index + 1);
        newEntries.push(action.payload);
        const shifted = newEntries.length > 50;
        if (shifted) newEntries.shift();
        return { entries: newEntries, index: newEntries.length - 1 };
      }
      case 'UNDO': {
        if (state.index > 0) return { ...state, index: state.index - 1 };
        return state;
      }
      case 'REDO': {
        if (state.index < state.entries.length - 1) return { ...state, index: state.index + 1 };
        return state;
      }
      default:
        return state;
    }
  };
  const [historyState, historyDispatch] = useReducer(historyReducer, { entries: [], index: -1 });

  // Derived state
  const selectedLayer = useMemo(() => {
    if (selectedLayers.length === 1) {
      return findLayer(layers, selectedLayers[0]);
    }
    return null;
  }, [layers, selectedLayers]);

  const pushHistory = useCallback((newLayers) => {
    historyDispatch({ type: 'PUSH', payload: JSON.stringify(newLayers) });
  }, []);

  // Derive layers from history whenever the index changes (single source of truth)
  useEffect(() => {
    if (historyState.index >= 0 && historyState.entries[historyState.index]) {
      setLayers(JSON.parse(historyState.entries[historyState.index]));
    }
  }, [historyState.index]);

  const undo = useCallback(() => {
    if (historyState.index > 0) {
      historyDispatch({ type: 'UNDO' });
    }
  }, [historyState.index]);

  const redo = useCallback(() => {
    if (historyState.index < historyState.entries.length - 1) {
      historyDispatch({ type: 'REDO' });
    }
  }, [historyState.index, historyState.entries.length]);

  // Layer operations
  const handleSelect = useCallback((layerId, addToSelection) => {
    if (!layerId) {
      setSelectedLayers([]);
      return;
    }
    if (addToSelection) {
      setSelectedLayers(prev => 
        prev.includes(layerId) ? prev.filter(id => id !== layerId) : [...prev, layerId]
      );
    } else {
      setSelectedLayers([layerId]);
    }
  }, []);

  const updateLayerInTree = (layers, id, updates) => {
    return layers.map(layer => {
      if (layer.id === id) {
        return { ...layer, ...updates };
      }
      if (layer.children) {
        return { ...layer, children: updateLayerInTree(layer.children, id, updates) };
      }
      return layer;
    });
  };

  const removeLayerFromTree = (layers, id) => {
    return layers.filter(layer => {
      return layer.id !== id;
    }).map(layer => {
      if (layer.children) {
        return { ...layer, children: removeLayerFromTree(layer.children, id) };
      }
      return layer;
    });
  };

  const handleUpdateLayer = useCallback((id, updates) => {
    setLayers(prev => {
      const newLayers = updateLayerInTree(prev, id, updates);
      return newLayers;
    });
  }, []);

  // Drag undo support: snapshot before drag starts, commit final state on drag end
  const handleDragStart = useCallback((currentLayers) => {
    // Always snapshot pre-drag state, deduplicating against the last history entry
    const serialized = JSON.stringify(currentLayers);
    const lastEntry = historyState.entries[historyState.index];
    if (lastEntry !== serialized) {
      pushHistory(currentLayers);
    }
  }, [pushHistory, historyState.entries, historyState.index]);

  const handleDragEnd = useCallback((layersAfterDrag) => {
    pushHistory(layersAfterDrag);
  }, [pushHistory]);

  const handleToggleVisibility = useCallback((id) => {
    setLayers(prev => {
      const layer = findLayer(prev, id);
      return updateLayerInTree(prev, id, { visible: layer?.visible === false ? true : false });
    });
  }, []);

  const handleToggleLock = useCallback((id) => {
    setLayers(prev => {
      const layer = findLayer(prev, id);
      return updateLayerInTree(prev, id, { locked: !layer?.locked });
    });
  }, []);

  const handleRename = useCallback((id, name) => {
    setLayers(prev => updateLayerInTree(prev, id, { name }));
  }, []);

  const handleDelete = useCallback(() => {
    setLayers(prev => {
      let newLayers = [...prev];
      selectedLayers.forEach(id => {
        newLayers = removeLayerFromTree(newLayers, id);
      });
      pushHistory(newLayers);
      return newLayers;
    });
    setSelectedLayers([]);
  }, [selectedLayers, pushHistory]);

  const handleDuplicate = useCallback(() => {
    setLayers(prev => {
      const newLayers = [...prev];
      selectedLayers.forEach(id => {
        const layer = findLayer(prev, id);
        if (layer) {
          const dup = JSON.parse(JSON.stringify(layer));
          dup.id = generateId();
          dup.name = layer.name + ' (copy)';
          dup.x = (dup.x || 0) + 20;
          dup.y = (dup.y || 0) + 20;
          newLayers.push(dup);
        }
      });
      pushHistory(newLayers);
      return newLayers;
    });
  }, [selectedLayers, pushHistory]);

  const handleGroup = useCallback(() => {
    if (selectedLayers.length < 2) return;
    setLayers(prev => {
      const selectedLayerObjects = selectedLayers.map(id => findLayer(prev, id)).filter(Boolean);
      const minX = Math.min(...selectedLayerObjects.map(l => l.x || 0));
      const minY = Math.min(...selectedLayerObjects.map(l => l.y || 0));
      
      let newLayers = [...prev];
      selectedLayers.forEach(id => {
        newLayers = removeLayerFromTree(newLayers, id);
      });
      
      const group = {
        id: generateId(),
        name: 'Group',
        type: 'group',
        x: minX,
        y: minY,
        width: Math.max(...selectedLayerObjects.map(l => (l.x || 0) + (l.width || 0))) - minX,
        height: Math.max(...selectedLayerObjects.map(l => (l.y || 0) + (l.height || 0))) - minY,
        visible: true,
        locked: false,
        children: selectedLayerObjects
      };
      
      newLayers.push(group);
      pushHistory(newLayers);
      return newLayers;
    });
    setSelectedLayers([]);
  }, [selectedLayers, pushHistory]);

  const handleUngroup = useCallback(() => {
    if (selectedLayers.length !== 1) return;
    const layer = findLayer(layers, selectedLayers[0]);
    if (!layer || !layer.children) return;
    
    setLayers(prev => {
      let newLayers = removeLayerFromTree([...prev], layer.id);
      newLayers = [...newLayers, ...layer.children];
      pushHistory(newLayers);
      return newLayers;
    });
    setSelectedLayers([]);
  }, [selectedLayers, layers, pushHistory]);

  // Fit screen
  const handleFitScreen = useCallback(() => {
    setZoom(0.8);
    setPan({ x: 100, y: 50 });
  }, []);

  // Export handler
  const handleExport = useCallback((format) => {
    const allLayersList = getAllLayers(layers);
    
    switch (format) {
      case 'figma-json': {
        const content = generateFigmaJSON(allLayersList, colors, typography, spacing);
        downloadFile(content, 'design-export.fig.json', 'application/json');
        break;
      }
      case 'figma-tokens': {
        const tokens = generateDesignTokens(colors, typography, spacing);
        downloadFile(JSON.stringify(tokens, null, 2), 'design-tokens.json', 'application/json');
        break;
      }
      case 'html': {
        const content = generateHTMLExport(allLayersList);
        downloadFile(content, 'design-export.html', 'text/html');
        break;
      }
      case 'react': {
        const content = generateReactExport(allLayersList);
        downloadFile(content, 'DesignExport.jsx', 'text/javascript');
        break;
      }
      case 'tailwind': {
        const content = generateTailwindExport(allLayersList);
        downloadFile(content, 'design-export-tailwind.html', 'text/html');
        break;
      }
      case 'css': {
        const content = generateCSSExport(allLayersList);
        downloadFile(content, 'design-export.css', 'text/css');
        break;
      }
      case 'json': {
        const content = JSON.stringify({ layers: allLayersList, colors, typography, spacing }, null, 2);
        downloadFile(content, 'design-structure.json', 'application/json');
        break;
      }
      case 'svg': {
        const content = generateSVGExport(allLayersList, canvasSize.width, canvasSize.height);
        downloadFile(content, 'design-export.svg', 'image/svg+xml');
        break;
      }
      case 'png': {
        // Create canvas and render
        const canvas = document.createElement('canvas');
        canvas.width = canvasSize.width;
        canvas.height = canvasSize.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        allLayersList.forEach(layer => {
          if (layer.fill) {
            ctx.fillStyle = layer.fill;
            if (layer.borderRadius) {
              ctx.beginPath();
              ctx.roundRect(layer.x, layer.y, layer.width, layer.height, layer.borderRadius);
              ctx.fill();
            } else {
              ctx.fillRect(layer.x, layer.y, layer.width, layer.height);
            }
          }
          if (layer.type === 'text' && layer.content) {
            ctx.fillStyle = layer.fill || '#000000';
            ctx.font = `${layer.fontWeight || 400} ${layer.fontSize || 14}px ${layer.fontFamily || 'sans-serif'}`;
            ctx.fillText(layer.content, layer.x, layer.y + (layer.fontSize || 14));
          }
        });
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'design-export.png';
          a.click();
          URL.revokeObjectURL(url);
        });
        break;
      }
    }
  }, [layers, colors, typography, spacing, canvasSize]);


  // Image analysis pipeline
  const analyzeImage = useCallback(async (dataUrl) => {
    setIsAnalyzing(true);
    setAnalysisProgress(0);
    setSourceImage(dataUrl);
    setHasProject(true);

    try {
      // Load image
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = dataUrl;
      });

      const width = img.naturalWidth;
      const height = img.naturalHeight;
      setCanvasSize({ width, height });

      // Create canvas for pixel analysis
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, width, height);

      const analyzer = new ImageAnalyzer(imageData, width, height);

      // Step 1: Layout detection
      setAnalysisProgress(10);
      await new Promise(r => setTimeout(r, 200));
      const regions = analyzer.detectLayoutRegions();
      setAnalysisProgress(20);

      // Step 2: Typography detection via OCR (if available)
      let textRegions = [];
      setAnalysisProgress(25);
      try {
        if (typeof Tesseract !== 'undefined') {
          const worker = await Tesseract.createWorker('eng');
          const { data } = await worker.recognize(dataUrl);
          textRegions = (data.words || []).filter(w => w.confidence > 50).map(word => ({
            text: word.text,
            x: word.bbox.x0,
            y: word.bbox.y0,
            width: word.bbox.x1 - word.bbox.x0,
            height: word.bbox.y1 - word.bbox.y0,
            fontSize: Math.round((word.bbox.y1 - word.bbox.y0) * 0.75),
            confidence: word.confidence
          }));
          await worker.terminate();
        } else {
          setOcrWarning('Tesseract.js not loaded: text detection skipped. Text layers will not be created.');
        }
      } catch (ocrError) {
        console.warn('OCR not available or failed:', ocrError);
        // Do NOT generate placeholder text regions - warn user instead
        setOcrWarning('OCR unavailable: text layers could not be extracted. Upload will proceed without text detection.');
        textRegions = [];
      }
      setAnalysisProgress(40);

      // Step 3: Color extraction
      await new Promise(r => setTimeout(r, 100));
      const extractedColors = analyzer.extractColors(12);
      setColors(extractedColors);
      setAnalysisProgress(55);

      // Step 4: Component detection
      await new Promise(r => setTimeout(r, 100));
      const components = analyzer.detectComponents();
      setAnalysisProgress(70);

      // Step 5: Spacing detection
      const detectedSpacing = analyzer.detectSpacing(regions);
      setSpacing(detectedSpacing.length > 0 ? detectedSpacing : [4, 8, 16, 24, 32, 48, 64]);
      setAnalysisProgress(80);

      // Step 6: Build typography scale
      const typographyScale = buildTypographyScale(textRegions);
      setTypography(typographyScale);
      setAnalysisProgress(85);

      // Step 7: Build layer hierarchy
      await new Promise(r => setTimeout(r, 150));
      const layerTree = buildLayerHierarchy(regions, components, textRegions, width, height, extractedColors);
      setLayers(layerTree);
      pushHistory(layerTree);
      setAnalysisProgress(100);

      // Save to IndexedDB
      try {
        await saveProject({
          id: 'current',
          name: 'Untitled Project',
          layers: layerTree,
          colors: extractedColors,
          typography: typographyScale,
          spacing: detectedSpacing,
          sourceImage: dataUrl,
          updatedAt: Date.now()
        });
        localStorage.setItem('ptp_lastProject', 'current');
      } catch (e) {
        console.warn('Failed to save to IndexedDB:', e);
      }

      // Finish
      await new Promise(r => setTimeout(r, 500));
      setIsAnalyzing(false);
      setActiveTab('layers');
    } catch (error) {
      console.error('Analysis failed:', error);
      setIsAnalyzing(false);
      setAnalysisProgress(0);
    }
  }, [pushHistory]);

  // Build typography scale from detected text
  function buildTypographyScale(textRegions) {
    if (textRegions.length === 0) {
      return [
        { name: 'H1', fontSize: 48, fontWeight: 700, fontFamily: 'Inter', lineHeight: 56 },
        { name: 'H2', fontSize: 36, fontWeight: 700, fontFamily: 'Inter', lineHeight: 44 },
        { name: 'H3', fontSize: 24, fontWeight: 600, fontFamily: 'Inter', lineHeight: 32 },
        { name: 'Body', fontSize: 16, fontWeight: 400, fontFamily: 'Inter', lineHeight: 24 },
        { name: 'Caption', fontSize: 12, fontWeight: 400, fontFamily: 'Inter', lineHeight: 16 },
        { name: 'Label', fontSize: 14, fontWeight: 500, fontFamily: 'Inter', lineHeight: 20 },
      ];
    }
    
    // Cluster by font size
    const sizes = textRegions.map(t => t.fontSize).filter(s => s > 5);
    const uniqueSizes = [...new Set(sizes)].sort((a, b) => b - a);
    
    const scale = [];
    const names = ['H1', 'H2', 'H3', 'H4', 'Body', 'Caption', 'Label', 'Button'];
    
    uniqueSizes.slice(0, 8).forEach((size, i) => {
      scale.push({
        name: names[i] || `Text-${size}`,
        fontSize: size,
        fontWeight: i < 3 ? 700 : i < 5 ? 600 : 400,
        fontFamily: 'Inter',
        lineHeight: Math.round(size * 1.4)
      });
    });
    
    return scale.length > 0 ? scale : [
      { name: 'H1', fontSize: 48, fontWeight: 700, fontFamily: 'Inter', lineHeight: 56 },
      { name: 'Body', fontSize: 16, fontWeight: 400, fontFamily: 'Inter', lineHeight: 24 },
    ];
  }

  // Build layer hierarchy from analysis results
  function buildLayerHierarchy(regions, components, textRegions, width, height, extractedColors) {
    const rootFrame = {
      id: generateId(),
      name: 'Frame',
      type: 'frame',
      x: 0, y: 0,
      width, height,
      visible: true,
      locked: false,
      fill: extractedColors.length > 0 ? extractedColors[extractedColors.length - 1].hex : '#ffffff',
      children: []
    };

    // Add sections from layout regions
    regions.forEach((region, i) => {
      const section = {
        id: generateId(),
        name: `Section ${i + 1}`,
        type: 'section',
        x: region.x,
        y: region.y,
        width: region.width,
        height: region.height,
        visible: true,
        locked: false,
        fill: 'transparent',
        children: []
      };

      // Add components within this section
      const sectionComponents = components.filter(c => 
        c.y >= region.y && c.y + c.height <= region.y + region.height
      );

      sectionComponents.forEach((comp, j) => {
        const layer = {
          id: generateId(),
          name: `${comp.type.charAt(0).toUpperCase() + comp.type.slice(1)} ${j + 1}`,
          type: comp.type,
          x: comp.x,
          y: comp.y,
          width: comp.width,
          height: comp.height,
          visible: true,
          locked: false,
          fill: comp.color,
          borderRadius: comp.type === 'button' ? 6 : comp.type === 'card' ? 8 : comp.type === 'input' ? 4 : 0,
          children: []
        };
        section.children.push(layer);
      });

      // Add text layers within this section
      const sectionTexts = textRegions.filter(t => 
        t.y >= region.y && t.y + t.height <= region.y + region.height
      );

      sectionTexts.forEach((text, j) => {
        const textLayer = {
          id: generateId(),
          name: text.text.substring(0, 30) || `Text ${j + 1}`,
          type: 'text',
          x: text.x,
          y: text.y,
          width: text.width,
          height: text.height,
          visible: true,
          locked: false,
          content: text.text,
          fontSize: text.fontSize || 14,
          fontWeight: text.fontSize > 24 ? 700 : text.fontSize > 16 ? 600 : 400,
          fontFamily: 'Inter',
          lineHeight: Math.round((text.fontSize || 14) * 1.4),
          letterSpacing: 0,
          textAlign: 'left',
          fill: extractedColors.length > 0 ? extractedColors[0].hex : '#000000'
        };
        section.children.push(textLayer);
      });

      rootFrame.children.push(section);
    });

    return [rootFrame];
  }


  // Keyboard shortcuts
  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.target.closest('input, textarea, select')) return;
      
      // Delete
      if ((e.key === 'Delete' || e.key === 'Backspace') && selectedLayers.length > 0) {
        e.preventDefault();
        handleDelete();
      }
      // Undo
      if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault();
        undo();
      }
      // Redo
      if ((e.metaKey || e.ctrlKey) && e.key === 'z' && e.shiftKey) {
        e.preventDefault();
        redo();
      }
      // Duplicate
      if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
        e.preventDefault();
        handleDuplicate();
      }
      // Group
      if ((e.metaKey || e.ctrlKey) && e.key === 'g' && !e.shiftKey) {
        e.preventDefault();
        handleGroup();
      }
      // Ungroup
      if ((e.metaKey || e.ctrlKey) && e.key === 'g' && e.shiftKey) {
        e.preventDefault();
        handleUngroup();
      }
      // Select all
      if ((e.metaKey || e.ctrlKey) && e.key === 'a') {
        e.preventDefault();
        setSelectedLayers(getAllLayers(layers).map(l => l.id));
      }
      // Tool shortcuts
      if (e.key === 'v') setTool('select');
      if (e.key === 'm') setTool('move');
      // Zoom shortcuts
      if ((e.metaKey || e.ctrlKey) && (e.key === '=' || e.key === '+')) {
        e.preventDefault();
        setZoom(z => Math.min(5, z + 0.25));
      }
      if ((e.metaKey || e.ctrlKey) && e.key === '-') {
        e.preventDefault();
        setZoom(z => Math.max(0.1, z - 0.25));
      }
      if ((e.metaKey || e.ctrlKey) && e.key === '0') {
        e.preventDefault();
        setZoom(1);
      }
    };

    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [selectedLayers, layers, handleDelete, handleDuplicate, handleGroup, handleUngroup, undo, redo]);

  // Clipboard paste for image upload
  useEffect(() => {
    const handlePaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          const reader = new FileReader();
          reader.onload = (ev) => {
            analyzeImage(ev.target.result);
          };
          reader.readAsDataURL(file);
          break;
        }
      }
    };

    window.addEventListener('paste', handlePaste);
    return () => window.removeEventListener('paste', handlePaste);
  }, [analyzeImage]);

  // Global drag and drop
  useEffect(() => {
    const handleDragOver = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    };
    const handleDrop = (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          analyzeImage(ev.target.result);
        };
        reader.readAsDataURL(file);
      }
    };

    window.addEventListener('dragover', handleDragOver);
    window.addEventListener('drop', handleDrop);
    return () => {
      window.removeEventListener('dragover', handleDragOver);
      window.removeEventListener('drop', handleDrop);
    };
  }, [analyzeImage]);

  // Load saved project on mount
  useEffect(() => {
    const loadSaved = async () => {
      try {
        const lastProjectId = localStorage.getItem('ptp_lastProject');
        if (lastProjectId) {
          const project = await loadProject(lastProjectId);
          if (project) {
            setLayers(project.layers || []);
            setColors(project.colors || []);
            setTypography(project.typography || []);
            setSpacing(project.spacing || []);
            setSourceImage(project.sourceImage || null);
            setHasProject(true);
            if (project.layers) pushHistory(project.layers);
          }
        }
      } catch (e) {
        console.warn('Failed to load saved project:', e);
      }
    };
    loadSaved();
  }, []);

  // Context menu handler
  const handleContextMenu = useCallback((e) => {
    e.preventDefault();
    const items = [
      { label: 'Select All', shortcut: 'Ctrl+A', action: () => setSelectedLayers(getAllLayers(layers).map(l => l.id)) },
      { separator: true },
      { label: 'Duplicate', shortcut: 'Ctrl+D', action: handleDuplicate, icon: <Icons.Copy /> },
      { label: 'Group', shortcut: 'Ctrl+G', action: handleGroup, icon: <Icons.Folder /> },
      { label: 'Ungroup', shortcut: 'Ctrl+Shift+G', action: handleUngroup },
      { separator: true },
      { label: 'Delete', shortcut: 'Del', action: handleDelete, icon: <Icons.Trash /> },
      { separator: true },
      { label: 'Upload Image', action: () => setShowUpload(true), icon: <Icons.Upload /> },
      { label: 'Fit to Screen', action: handleFitScreen, icon: <Icons.Maximize /> },
    ];
    setContextMenu({ x: e.clientX, y: e.clientY, items });
  }, [layers, handleDuplicate, handleGroup, handleUngroup, handleDelete, handleFitScreen]);

  // Render
  return (
    <div className="h-full flex flex-col" onContextMenu={handleContextMenu}>
      {/* Toolbar */}
      <Toolbar
        zoom={zoom}
        onZoom={setZoom}
        onFitScreen={handleFitScreen}
        tool={tool}
        setTool={setTool}
        onUndo={undo}
        onRedo={redo}
        canUndo={historyState.index > 0}
        canRedo={historyState.index < historyState.entries.length - 1}
      />

      {/* Main content */}
      <div className="flex-1 flex overflow-hidden">
        {/* Left sidebar */}
        <LeftSidebar
          layers={layers}
          selectedLayers={selectedLayers}
          onSelect={handleSelect}
          onToggleVisibility={handleToggleVisibility}
          onToggleLock={handleToggleLock}
          onRename={handleRename}
          onDelete={handleDelete}
          onDuplicate={handleDuplicate}
          colors={colors}
          typography={typography}
          spacing={spacing}
          onUpload={() => setShowUpload(true)}
          activeTab={activeTab}
          setActiveTab={setActiveTab}
          onExport={handleExport}
        />

        {/* Center canvas or welcome */}
        {hasProject ? (
          <CanvasEditor
            layers={layers}
            selectedLayers={selectedLayers}
            onSelect={handleSelect}
            onUpdateLayer={handleUpdateLayer}
            onDragStart={handleDragStart}
            onDragEnd={handleDragEnd}
            zoom={zoom}
            pan={pan}
            onZoom={setZoom}
            onPan={setPan}
            canvasSize={canvasSize}
            sourceImage={sourceImage}
          />
        ) : (
          <WelcomeScreen onUpload={() => setShowUpload(true)} />
        )}

        {/* Right sidebar */}
        <RightSidebar
          selectedLayer={selectedLayer}
          onUpdateLayer={handleUpdateLayer}
        />
      </div>

      {/* Upload modal */}
      <UploadModal
        isOpen={showUpload}
        onClose={() => setShowUpload(false)}
        onImageLoad={analyzeImage}
      />

      {/* Analysis progress panel */}
      <AnalysisPanel progress={analysisProgress} isAnalyzing={isAnalyzing} />

      {/* OCR warning notification */}
      {ocrWarning && (
        <div className="fixed bottom-4 right-4 z-50 max-w-sm bg-yellow-900/90 border border-yellow-600 text-yellow-200 px-4 py-3 rounded-lg shadow-lg animate-slide-in flex items-start gap-2">
          <span className="text-yellow-400 mt-0.5">&#9888;</span>
          <div className="flex-1">
            <p className="text-sm">{ocrWarning}</p>
          </div>
          <button onClick={() => setOcrWarning(null)} className="text-yellow-400 hover:text-yellow-200 text-lg leading-none">&times;</button>
        </div>
      )}

      {/* Context menu */}
      {contextMenu && (
        <ContextMenu
          x={contextMenu.x}
          y={contextMenu.y}
          items={contextMenu.items}
          onClose={() => setContextMenu(null)}
        />
      )}
    </div>
  );
}

// ============================================================
// RENDER
// ============================================================

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
